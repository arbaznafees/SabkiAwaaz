version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sabkiawaaz-db
    environment:
      POSTGRES_DB: sabkiawaaz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
